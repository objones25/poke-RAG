name: Security

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  schedule:
    # Every Sunday at 02:00 UTC — catch new CVEs between pushes
    - cron: "0 2 * * 0"

jobs:
  bandit:
    name: Bandit (SAST)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install bandit
        run: uv tool install bandit

      - name: Run bandit
        run: |
          uv tool run bandit -r src/ \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            --confidence-level medium || true

      - name: Check for HIGH/CRITICAL issues
        run: |
          python - <<'EOF'
          import json, sys
          with open("bandit-report.json") as f:
              report = json.load(f)
          issues = [
              r for r in report.get("results", [])
              if r["issue_severity"] in ("HIGH", "CRITICAL")
          ]
          if issues:
              for issue in issues:
                  print(f"[{issue['issue_severity']}] {issue['filename']}:{issue['line_number']} — {issue['issue_text']}")
              sys.exit(1)
          print("No HIGH/CRITICAL issues found.")
          EOF

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install pip-audit
        run: uv tool install pip-audit

      - name: Export dependencies
        run: |
          echo '{"dependencies": []}' > pip-audit-report.json
          uv export --no-dev --no-emit-project --format requirements-txt > requirements-audit.txt

      - name: Run pip-audit
        run: |
          uv tool run pip-audit \
            -r requirements-audit.txt \
            --desc \
            --format json \
            --output pip-audit-report.json || true

      - name: Check for vulnerabilities
        run: |
          python - <<'EOF'
          import json, sys
          with open("pip-audit-report.json") as f:
              report = json.load(f)
          vulns = [d for d in report.get("dependencies", []) if d.get("vulns")]
          if vulns:
              for dep in vulns:
                  for v in dep["vulns"]:
                      print(f"[CVE] {dep['name']}=={dep['version']}: {v['id']} — {v['description'][:120]}")
              sys.exit(1)
          print("No known vulnerabilities found.")
          EOF

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json
