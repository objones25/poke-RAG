# Retrieval evaluation questions  (v3)
# =====================================================================
#
# Schema:
#   id:                       stable identifier
#   query:                    the natural-language question
#   category:                 question type (taxonomy below)
#   difficulty:               easy | medium | hard
#   source_hint:              pokeapi | smogon | bulbapedia
#   gold:                     [<file_prefix>:<entity_lower>, ...]
#                             file_prefix matches `original_doc_id` minus the
#                             trailing _<n> (e.g. "pokemon_moves_1252" → "pokemon_moves")
#                             entity name is lowercased to match payload.entity_name
#   match:                    any | all   (default: any)
#   min_recall:               float in (0,1] (only used for match=all; default 1.0)
#   hard_negatives:           [<file>:<entity>, ...]   (optional)
#   requires_decomposition:   bool. True => question needs query decomposition / HyDE /
#                             iterative retrieval to succeed; vanilla single-pass
#                             retrieval is expected to fail. The harness buckets these
#                             out of headline numbers by default.
#   notes:                    free-text annotation explaining why the question is hard
#
# Taxonomy:
#   easy_lexical    — entity name in query, single chunk; baseline ceiling
#   anonymized      — entity described by a property; vanilla retrieval CAN solve
#                     if the property phrase is in the gold chunk
#   paraphrase      — query and gold share little vocabulary; tests semantic match
#   confusable      — multiple plausible candidates; reranker discrimination test
#   aggregation     — answer = several gold chunks; tests ranking diversity & top-k depth
#   comparative     — names two entities; both gold chunks must rank well
#   long_tail       — less-famous entity; embedder confidence test
#   variant         — form / regional / Mega disambiguation
#   multi_source    — single named entity, info spread across files (species + smogon
#                     for the SAME entity); single-pass should handle it
#   multi_hop       — answer requires composing facts across passages; needs query
#                     decomposition. Tagged requires_decomposition: true.
#
# Notes on multi-hop (literature-grounded):
#   Multi-hop QA benchmarks (HotpotQA, MuSiQue, 2WikiMultiHopQA) consistently find
#   that bridge questions ("the X that has property Y") cannot be solved by a single
#   dense-retrieval pass when the property and the answer live in different chunks
#   without shared vocabulary. The standard remedy is query decomposition
#   (Self-RAG, Self-Ask, HyDE). We tag those questions accordingly so vanilla
#   retrieval results aren't unfairly dragged down.
#
# 60 questions. All gold IDs use lowercased entity names matching payload.entity_name.
# =====================================================================

# ---------------------------------------------------------------------
