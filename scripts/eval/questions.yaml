# ---------------------------------------------------------------------
# multi_hop  (5)  — REQUIRES query decomposition
#   Vanilla retrieval is expected to fail. These run if you've enabled
#   HyDE / query rewriting and want to measure the lift.
# ---------------------------------------------------------------------

- id: mh001
  query: "Where can I catch the Pokémon that evolves into Gyarados?"
  category: multi_hop
  difficulty: hard
  source_hint: pokeapi
  gold: [pokemon_encounters:magikarp]
  requires_decomposition: true
  notes: |
    Magikarp's encounter chunk doesn't mention Gyarados — those facts live
    in the species chunk. A single embedding pass cannot bridge from the
    query's "evolves into Gyarados" to the encounters chunk.
    Standard fix: decompose into "what evolves into Gyarados?" → "Magikarp"
    → "Magikarp encounter locations".

- id: mh002
  query: "What is the competitive role of the Pokémon that evolves from Mienfoo?"
  category: paraphrase
  difficulty: hard
  source_hint: smogon
  gold: [pokemon:mienshao]
  notes: |
    Originally tagged multi_hop, but BGE bridges Mienfoo→Mienshao via
    semantic similarity without decomposition (Mienshao's Smogon entry
    does not mention Mienfoo — confirmed by grep). Retagged to paraphrase.

